<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Data Analytics Academy (Fixed)</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
background:#0b1020;
color:white;
}

#sidebar{
width:300px;
background:#111827;
padding:10px;
overflow:auto;
}

.topic{
padding:10px;
margin:6px;
background:#1f2937;
border-radius:6px;
cursor:pointer;
}

.topic:hover{background:#374151;}
.topic.active{background:#38bdf8;color:black;}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#top{
padding:10px;
border-bottom:1px solid #1f2937;
}

#content{
flex:1;
display:flex;
}

.panel{
flex:1;
padding:15px;
overflow:auto;
}

button{
padding:8px;
margin:5px;
}

canvas{
background:white;
border-radius:10px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">

<h3>📊 Data Analytics Academy</h3>

<div class="topic" onclick="openTopic(this,'intro')">Introduction</div>
<div class="topic" onclick="openTopic(this,'types')">Types of Data</div>
<div class="topic" onclick="openTopic(this,'collection')">Data Collection</div>
<div class="topic" onclick="openTopic(this,'cleaning')">Data Cleaning</div>
<div class="topic" onclick="openTopic(this,'stats')">Descriptive Stats</div>
<div class="topic" onclick="openTopic(this,'prob')">Probability</div>
<div class="topic" onclick="openTopic(this,'corr')">Correlation</div>
<div class="topic" onclick="openTopic(this,'reg')">Regression</div>

</div>

<!-- MAIN -->
<div id="main">

<div id="top">
<h2 id="title">Welcome</h2>
<p>Structured learning platform</p>
</div>

<div id="content">

<div class="panel" id="theory"></div>
<div class="panel" id="lab"></div>

</div>

</div>

<script>

let page = 0;
let current = "intro";
let chart = null;

/* ================= DEEP THEORY (REAL CONTENT) ================= */

const course = {

intro:[
`<h2>Introduction to Data Analytics</h2>
<p>Data Analytics is the science of examining raw data to extract meaningful insights.</p>
<p>It combines statistics, programming, and domain knowledge.</p>
<p><b>Core idea:</b> Data → Information → Insight → Decision</p>
<p>It is used in industries like finance, healthcare, marketing, AI systems, and logistics.</p>`,

`<h2>Why Data Analytics Matters</h2>
<p>Modern companies generate massive data every second.</p>
<p>Without analytics, this data is useless noise.</p>
<p>Analytics helps answer:</p>
<ul>
<li>What happened?</li>
<li>Why did it happen?</li>
<li>What will happen next?</li>
</ul>`,

`<h2>Real Example</h2>
<p>Netflix uses analytics to recommend movies.</p>
<p>Amazon uses it to predict what users will buy.</p>
<p>Uber uses it to optimize pricing and routes.</p>`
],

types:[
`<h2>Types of Data</h2>
<p>Data is classified into qualitative and quantitative types.</p>
<p>Qualitative = categories, labels</p>
<p>Quantitative = numbers, measurable values</p>`,

`<h2>Subtypes of Data</h2>
<p>Discrete data: number of students, cars</p>
<p>Continuous data: height, weight, time</p>
<p>Correct classification decides correct analysis methods.</p>`,

`<h2>Why Types Matter</h2>
<p>Wrong data type selection leads to wrong models.</p>
<p>Example: You cannot average categories like “red, blue”.</p>`
],

collection:[
`<h2>Data Collection</h2>
<p>Data comes from APIs, sensors, surveys, transactions, logs.</p>
<p>Each source has noise and bias.</p>`,

`<h2>Data Quality</h2>
<p>Good data = accurate, complete, consistent, timely.</p>
<p>Poor data leads to misleading conclusions.</p>`,

`<h2>Real Industry Use</h2>
<p>Google collects search logs.</p>
<p>Banks collect transaction data.</p>
<p>Hospitals collect patient records for diagnosis models.</p>`
],

cleaning:[
`<h2>Data Cleaning</h2>
<p>Raw data is never clean.</p>
<p>It contains missing values, duplicates, and errors.</p>`,

`<h2>Cleaning Techniques</h2>
<p>Remove nulls, fill missing values, normalize formats.</p>
<p>Outlier detection is also important.</p>`,

`<h2>Why It Matters</h2>
<p>80% of data science work is cleaning.</p>
<p>Bad cleaning = wrong AI model results.</p>`
],

stats:[
`<h2>Descriptive Statistics</h2>
<p>Mean = average</p>
<p>Median = middle value</p>
<p>Mode = most frequent value</p>`,

`<h2>Spread of Data</h2>
<p>Variance shows how data spreads.</p>
<p>Standard deviation = square root of variance.</p>`,

`<h2>Usage</h2>
<p>Used in finance, risk analysis, forecasting models.</p>`
],

prob:[
`<h2>Probability</h2>
<p>Measures uncertainty of events.</p>
<p>0 = impossible, 1 = certain.</p>`,

`<h2>Real Meaning</h2>
<p>Probability models randomness in real systems.</p>
<p>Used in AI, weather forecasting, fraud detection.</p>`,

`<h2>Law of Large Numbers</h2>
<p>More trials → more stable probability results.</p>`
],

corr:[
`<h2>Correlation</h2>
<p>Measures relationship between variables.</p>
<p>Range: -1 to +1</p>`,

`<h2>Interpretation</h2>
<p>+1 = strong positive relationship</p>
<p>-1 = strong negative relationship</p>`,

`<h2>Important Rule</h2>
<p>Correlation does NOT mean causation.</p>
<p>Two variables can move together without causing each other.</p>`
],

reg:[
`<h2>Regression</h2>
<p>Used to predict numeric outcomes.</p>
<p>Equation: y = mx + c</p>`,

`<h2>How It Works</h2>
<p>Finds best fitting line through data points.</p>
<p>Minimizes error between predicted and actual values.</p>`,

`<h2>Real Use</h2>
<p>Used in stock prediction, housing prices, sales forecasting.</p>`
]

};

/* ================= NAVIGATION ================= */

function openTopic(el, topic){
current = topic;
page = 0;

document.querySelectorAll(".topic").forEach(t=>t.classList.remove("active"));
el.classList.add("active");

render();
}

function next(){
if(page < 2){
page++;
render();
}
}

function prev(){
if(page > 0){
page--;
render();
}
}

/* ================= RENDER ================= */

function render(){

document.getElementById("theory").innerHTML =
course[current][page];

document.getElementById("lab").innerHTML = `
<h3>Lab</h3>

<button onclick="prev()">⬅ Prev</button>
<button onclick="next()">Next ➡</button>

<hr>

<button onclick="runSim()">Run Simulation</button>
<canvas id="chart"></canvas>
`;
}

/* ================= SIMULATION ================= */

function runSim(){

if(chart) chart.destroy();

let data = Array.from({length:25},()=>Math.random()*100);

chart = new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:data.map((_,i)=>i),
datasets:[{
label:"Sample Data",
data:data,
backgroundColor:"#38bdf8"
}]
}
});

}

/* ================= INIT ================= */

render();

</script>

</body>
</html>
