<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Data Analytics Pro Lab</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
  height: 100vh;
  background: #0a0f1f;
  color: white;
}

#sidebar {
  width: 280px;
  background: #111827;
  overflow-y: auto;
  padding: 10px;
}

.topic {
  padding: 10px;
  margin: 6px;
  background: #1f2937;
  cursor: pointer;
  border-radius: 6px;
}

.topic:hover { background: #374151; }
.topic.active { background: #38bdf8; color: black; }

#main {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

#title {
  color: #38bdf8;
}

canvas {
  background: white;
  border-radius: 10px;
  margin-top: 20px;
}
</style>
</head>

<body>

<div id="sidebar">
  <h3>📊 Data Analytics Pro</h3>

  <div class="topic active" onclick="loadTopic('intro')">Introduction</div>
  <div class="topic" onclick="loadTopic('probability')">Probability Lab</div>
  <div class="topic" onclick="loadTopic('correlation')">Correlation Lab</div>
  <div class="topic" onclick="loadTopic('regression')">Regression Lab</div>
  <div class="topic" onclick="loadTopic('eda')">EDA Dashboard</div>
</div>

<div id="main">
  <h2 id="title">Welcome</h2>
  <p id="desc">Select a module</p>
  <canvas id="chart"></canvas>
</div>

<script>

let chart;

/* ---------------- CLEAN ENGINE ---------------- */

function destroyChart(){
  if(chart) chart.destroy();
}

/* ---------------- TOPIC SYSTEM ---------------- */

function loadTopic(topic){

document.querySelectorAll(".topic").forEach(t=>t.classList.remove("active"));
event.target.classList.add("active");

destroyChart();

const canvas = document.getElementById("chart");
canvas.style.display = "block";

/* ================= INTRO ================= */
if(topic === "intro"){
document.getElementById("title").innerText = "What is Data Analytics?";
document.getElementById("desc").innerText =
"Data Analytics is the process of converting raw data into meaningful insights using statistics, programming and visualization.";

canvas.style.display = "none";
}

/* ================= PROBABILITY LAB ================= */
if(topic === "probability"){

document.getElementById("title").innerText = "Probability Simulation Engine";

let heads=0, tails=0;

for(let i=0;i<2000;i++){
  Math.random()>0.5 ? heads++ : tails++;
}

chart = new Chart(canvas,{
type:"pie",
data:{
labels:["Heads","Tails"],
datasets:[{
data:[heads,tails],
backgroundColor:["#38bdf8","#f87171"]
}]
},
options:{
plugins:{
legend:{labels:{color:"white"}}
}
}
});

document.getElementById("desc").innerText =
"Simulates 2000 coin flips to demonstrate probability distribution convergence.";
}

/* ================= CORRELATION LAB ================= */
if(topic === "correlation"){

document.getElementById("title").innerText = "Correlation Explorer";

let data=[];

for(let i=0;i<25;i++){
data.push({
x:i,
y: 2*i + (Math.random()*10)
});
}

chart = new Chart(canvas,{
type:"scatter",
data:{
datasets:[{
label:"Study vs Score",
data:data,
backgroundColor:"#38bdf8"
}]
}
});

document.getElementById("desc").innerText =
"Shows positive correlation between variables using synthetic dataset.";
}

/* ================= REGRESSION LAB ================= */
if(topic === "regression"){

document.getElementById("title").innerText = "Regression Analyzer";

let x=[], y=[], line=[];

for(let i=0;i<25;i++){
x.push(i);
y.push(3*i + (Math.random()*8));
line.push(3*i);
}

chart = new Chart(canvas,{
type:"line",
data:{
labels:x,
datasets:[
{
label:"Data Points",
data:y,
borderColor:"#38bdf8",
fill:false
},
{
label:"Trend Line",
data:line,
borderColor:"#f87171",
fill:false
}
]
}
});

document.getElementById("desc").innerText =
"Visualizes linear regression with noisy real-world-like data.";
}

/* ================= EDA DASHBOARD ================= */
if(topic === "eda"){

document.getElementById("title").innerText = "EDA Dashboard";

let data=[];

for(let i=0;i<30;i++){
data.push(Math.floor(Math.random()*100));
}

let mean = data.reduce((a,b)=>a+b)/data.length;

chart = new Chart(canvas,{
type:"bar",
data:{
labels:data.map((_,i)=>"D"+i),
datasets:[{
label:"Values",
data:data,
backgroundColor:"#38bdf8"
}]
},
options:{
plugins:{
legend:{labels:{color:"white"}}
}
}
});

document.getElementById("desc").innerText =
`EDA Summary: Mean = ${mean.toFixed(2)} | Dataset Size = ${data.length}`;
}

}

</script>

</body>
</html>
