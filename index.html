<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Data Science Studio Pro+</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
background:#0a0f1f;
color:white;
}

#sidebar{
width:300px;
background:#111827;
padding:10px;
overflow:auto;
border-right:1px solid #1f2937;
}

.topic{
padding:10px;
margin:6px;
background:#1f2937;
border-radius:6px;
cursor:pointer;
}

.topic:hover{background:#374151;}
.topic.active{background:#38bdf8;color:black;}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#top{
padding:12px;
border-bottom:1px solid #1f2937;
}

#content{
flex:1;
display:flex;
gap:10px;
padding:10px;
}

.panel{
flex:1;
background:#111827;
padding:10px;
border-radius:10px;
overflow:auto;
}

select, input, button{
padding:8px;
margin:5px;
}
canvas{
background:white;
border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">

<h3>📊 Data Science Studio Pro+</h3>

<div class="topic active" onclick="load('intro')">Introduction</div>
<div class="topic" onclick="load('csv')">Dataset Explorer</div>
<div class="topic" onclick="load('eda')">EDA Engine</div>
<div class="topic" onclick="load('corr')">Correlation Matrix</div>
<div class="topic" onclick="load('reg')">Regression Lab</div>
<div class="topic" onclick="load('prob')">Probability Simulator</div>

</div>

<!-- MAIN -->
<div id="main">

<div id="top">
<h2 id="title">Welcome</h2>
<p id="desc">Load dataset or start analysis</p>
</div>

<div id="content">

<div class="panel" id="left"></div>
<div class="panel" id="right"></div>

</div>

</div>

<script>

let dataset = [];
let columns = [];
let chartLeft, chartRight;

/* ---------------- UTIL ---------------- */

function mean(a){return a.reduce((x,y)=>x+y)/a.length;}
function variance(a){let m=mean(a);return mean(a.map(x=>(x-m)**2));}
function std(a){return Math.sqrt(variance(a));}

/* ---------------- CSV ENGINE ---------------- */

function parseCSV(text){
let rows = text.trim().split("\n").map(r=>r.split(","));
columns = rows[0];
let data = columns.map((_,i)=>rows.slice(1).map(r=>+r[i]));
return data;
}

/* ---------------- MAIN LOAD ---------------- */

function load(page){

document.querySelectorAll(".topic").forEach(t=>t.classList.remove("active"));
event.target.classList.add("active");

document.getElementById("left").innerHTML="";
document.getElementById("right").innerHTML="";

if(chartLeft) chartLeft.destroy();
if(chartRight) chartRight.destroy();

/* ---------------- INTRO ---------------- */
if(page==="intro"){
document.getElementById("title").innerText="Data Science Studio Pro+";
document.getElementById("desc").innerText="Real dataset-driven analytics environment";

document.getElementById("left").innerHTML=`
<h2>Welcome</h2>
<p>This is a mini data science environment like Jupyter + Tableau.</p>
<p>You can upload datasets, analyze columns, and visualize relationships.</p>
`;

return;
}

/* ---------------- CSV LOADER ---------------- */
if(page==="csv"){

document.getElementById("title").innerText="Dataset Explorer";
document.getElementById("desc").innerText="Upload CSV to begin analysis";

document.getElementById("left").innerHTML=`
<h3>Upload Dataset</h3>
<input type="file" id="file">
<button onclick="loadCSV()">Load</button>
`;

document.getElementById("right").innerHTML=`
<h3>Analysis Panel</h3>
<p>Waiting for dataset...</p>
`;

}

/* ---------------- EDA ---------------- */
if(page==="eda"){

showControls();

}

/* ---------------- CORRELATION ---------------- */
if(page==="corr"){

showControls(true);

}

/* ---------------- REGRESSION ---------------- */
if(page==="reg"){

showControls(true);

}

/* ---------------- PROBABILITY ---------------- */
if(page==="prob"){

document.getElementById("left").innerHTML="<h3>Probability Simulation</h3>";

let n=3000, h=0;
for(let i=0;i<n;i++) if(Math.random()>0.5) h++;

let canvas=document.createElement("canvas");
document.getElementById("right").appendChild(canvas);

chartRight=new Chart(canvas,{
type:"pie",
data:{
labels:["Heads","Tails"],
datasets:[{data:[h,n-h],backgroundColor:["#38bdf8","#f87171"]}]
}
});

}

}

/* ---------------- CSV LOAD ---------------- */

function loadCSV(){

let file=document.getElementById("file").files[0];
let reader=new FileReader();

reader.onload=function(e){

dataset=parseCSV(e.target.result);

showControls();

};

reader.readAsText(file);
}

/* ---------------- CONTROLS ---------------- */

function showControls(requireXY=false){

document.getElementById("left").innerHTML=`
<h3>Controls</h3>

<select id="colX"></select>
<select id="colY"></select>

<button onclick="runAnalysis('scatter')">Scatter</button>
<button onclick="runAnalysis('hist')">Histogram</button>
<button onclick="runAnalysis('stats')">Stats</button>
`;

setTimeout(()=>{

let x=document.getElementById("colX");
let y=document.getElementById("colY");

x.innerHTML="";
y.innerHTML="";

columns.forEach(c=>{
x.innerHTML+=`<option>${c}</option>`;
y.innerHTML+=`<option>${c}</option>`;
});

},100);
}

/* ---------------- ANALYSIS ENGINE ---------------- */

function runAnalysis(type){

if(chartRight) chartRight.destroy();

let colX = columns.indexOf(document.getElementById("colX").value);
let colY = columns.indexOf(document.getElementById("colY").value);

let x = dataset[colX];
let y = dataset[colY];

let canvas=document.createElement("canvas");
document.getElementById("right").innerHTML="";
document.getElementById("right").appendChild(canvas);

/* ---------------- SCATTER ---------------- */
if(type==="scatter"){

let data=x.map((v,i)=>({x:v,y:y[i]}));

chartRight=new Chart(canvas,{
type:"scatter",
data:{datasets:[{data:data,backgroundColor:"#38bdf8"}]}
});
}

/* ---------------- HISTOGRAM ---------------- */
if(type==="hist"){

chartRight=new Chart(canvas,{
type:"bar",
data:{
labels:x,
datasets:[{data:x,backgroundColor:"#38bdf8"}]
}
});
}

/* ---------------- STATS ---------------- */
if(type==="stats"){

document.getElementById("right").innerHTML=`
<h3>Statistics</h3>
<p>Mean X: ${mean(x).toFixed(2)}</p>
<p>Mean Y: ${mean(y).toFixed(2)}</p>
<p>Std X: ${std(x).toFixed(2)}</p>
<p>Std Y: ${std(y).toFixed(2)}</p>
`;
}

}

</script>

</body>
</html>
