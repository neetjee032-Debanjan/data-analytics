<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Data Science Platform Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
background:#0a0f1f;
color:white;
}

/* SIDEBAR */
#sidebar{
width:320px;
background:#111827;
padding:10px;
overflow:auto;
border-right:1px solid #1f2937;
}

.topic{
padding:10px;
margin:6px;
background:#1f2937;
border-radius:6px;
cursor:pointer;
}

.topic:hover{background:#374151;}
.topic.active{background:#38bdf8;color:black;}

/* MAIN */
#main{
flex:1;
display:flex;
flex-direction:column;
}

#header{
padding:12px;
border-bottom:1px solid #1f2937;
}

#content{
flex:1;
display:flex;
gap:10px;
padding:10px;
}

.panel{
flex:1;
background:#111827;
padding:10px;
border-radius:10px;
overflow:auto;
}

canvas{
background:white;
border-radius:10px;
margin-top:10px;
}

select, button, input{
padding:8px;
margin:5px 0;
width:100%;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">

<h3>📊 Data Science Pro Platform</h3>

<div class="topic active" onclick="load('intro')">Introduction</div>
<div class="topic" onclick="load('csv')">Dataset Loader</div>
<div class="topic" onclick="load('eda')">EDA</div>
<div class="topic" onclick="load('corr')">Correlation Matrix</div>
<div class="topic" onclick="load('reg')">Regression</div>
<div class="topic" onclick="load('kmeans')">K-Means Clustering</div>

</div>

<!-- MAIN -->
<div id="main">

<div id="header">
<h2 id="title">Welcome</h2>
<p id="desc">Professional data science environment</p>
</div>

<div id="content">

<div class="panel" id="left"></div>
<div class="panel" id="right"></div>

</div>

</div>

<script>

let dataset = [];
let columns = [];
let chart;

/* ---------------- BASIC MATH ---------------- */

function mean(a){return a.reduce((x,y)=>x+y)/a.length;}
function variance(a){let m=mean(a);return mean(a.map(x=>(x-m)**2));}
function std(a){return Math.sqrt(variance(a));}

/* ---------------- CSV PARSER ---------------- */

function parseCSV(text){
let rows = text.trim().split("\n").map(r=>r.split(","));
columns = rows[0];
return columns.map((_,i)=>rows.slice(1).map(r=>+r[i]));
}

/* ---------------- UI LOAD ---------------- */

function load(page){

document.querySelectorAll(".topic").forEach(t=>t.classList.remove("active"));
event.target.classList.add("active");

document.getElementById("left").innerHTML="";
document.getElementById("right").innerHTML="";

if(chart) chart.destroy();

/* ---------------- INTRO ---------------- */
if(page==="intro"){
document.getElementById("left").innerHTML=`
<h2>Data Science Platform</h2>
<p>This is a mini professional analytics environment.</p>
<p>Features: EDA, ML basics, regression, clustering.</p>
`;
return;
}

/* ---------------- CSV LOADER ---------------- */
if(page==="csv"){
document.getElementById("left").innerHTML=`
<h3>Upload CSV Dataset</h3>
<input type="file" id="file">
<button onclick="loadCSV()">Load Dataset</button>
`;

document.getElementById("right").innerHTML=`
<h3>Dataset Info</h3>
<p>No dataset loaded</p>
`;
}

/* ---------------- EDA ---------------- */
if(page==="eda"){
renderControls();
}

/* ---------------- CORRELATION ---------------- */
if(page==="corr"){
renderControls();
}

/* ---------------- REGRESSION ---------------- */
if(page==="reg"){
renderControls();
}

/* ---------------- KMEANS ---------------- */
if(page==="kmeans"){
renderControls();
}

}

/* ---------------- LOAD CSV ---------------- */

function loadCSV(){
let file=document.getElementById("file").files[0];
let reader=new FileReader();

reader.onload=function(e){
dataset=parseCSV(e.target.result);
renderControls();
};

reader.readAsText(file);
}

/* ---------------- CONTROLS ---------------- */

function renderControls(){

document.getElementById("left").innerHTML=`
<h3>Controls</h3>

<select id="x"></select>
<select id="y"></select>

<button onclick="run('eda')">EDA</button>
<button onclick="run('corr')">Correlation</button>
<button onclick="run('reg')">Regression</button>
<button onclick="run('kmeans')">K-Means</button>
`;

setTimeout(()=>{

let x=document.getElementById("x");
let y=document.getElementById("y");

x.innerHTML="";
y.innerHTML="";

columns.forEach(c=>{
x.innerHTML+=`<option>${c}</option>`;
y.innerHTML+=`<option>${c}</option>`;
});

},100);
}

/* ---------------- ANALYTICS ENGINE ---------------- */

function run(type){

let x=dataset[columns.indexOf(document.getElementById("x").value)];
let y=dataset[columns.indexOf(document.getElementById("y").value)];

let canvas=document.createElement("canvas");
document.getElementById("right").innerHTML="";
document.getElementById("right").appendChild(canvas);

if(chart) chart.destroy();

/* ---------------- EDA ---------------- */
if(type==="eda"){
document.getElementById("right").innerHTML=`
<h3>EDA Stats</h3>
<p>Mean X: ${mean(x).toFixed(2)}</p>
<p>Std X: ${std(x).toFixed(2)}</p>
<p>Mean Y: ${mean(y).toFixed(2)}</p>
<p>Std Y: ${std(y).toFixed(2)}</p>
`;
}

/* ---------------- CORRELATION ---------------- */
if(type==="corr"){
chart=new Chart(canvas,{
type:"scatter",
data:{datasets:[{data:x.map((v,i)=>({x:v,y:y[i]})),backgroundColor:"#38bdf8"}]}
});
}

/* ---------------- REGRESSION ---------------- */
if(type==="reg"){
let line=x.map(v=>v*1.5);

chart=new Chart(canvas,{
type:"line",
data:{
labels:x,
datasets:[
{label:"Data",data:y,borderColor:"#38bdf8",fill:false},
{label:"Trend",data:line,borderColor:"#f87171",fill:false}
]
}
});
}

/* ---------------- KMEANS (SIMULATED) ---------------- */
if(type==="kmeans"){
let clusters = x.map(v=> v>50 ? 1 : 0);

chart=new Chart(canvas,{
type:"scatter",
data:{
datasets:[
{
label:"Clustered Data",
data:x.map((v,i)=>({x:v,y:y[i]})),
backgroundColor:"#38bdf8"
}
]
}
});
}

}

</script>

</body>
</html>
