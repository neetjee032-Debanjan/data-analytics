<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Data Analytics Learning Platform</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
background:#0b1020;
color:white;
}

/* SIDEBAR */
#sidebar{
width:320px;
background:#111827;
padding:10px;
overflow:auto;
}

.topic{
padding:10px;
margin:6px;
background:#1f2937;
border-radius:6px;
cursor:pointer;
}

.topic:hover{background:#374151;}
.topic.active{background:#38bdf8;color:black;}

/* MAIN */
#main{
flex:1;
display:flex;
flex-direction:column;
}

#topbar{
padding:10px;
border-bottom:1px solid #1f2937;
}

#content{
flex:1;
display:flex;
}

.panel{
flex:1;
padding:15px;
overflow:auto;
}

button, input, textarea, select{
padding:8px;
margin:5px 0;
width:100%;
}

canvas{
background:white;
border-radius:10px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
<h3>📊 Data Analytics Academy</h3>

<div class="topic active" onclick="openTopic('intro')">Introduction</div>
<div class="topic" onclick="openTopic('types')">Types of Data</div>
<div class="topic" onclick="openTopic('collection')">Data Collection</div>
<div class="topic" onclick="openTopic('cleaning')">Data Cleaning</div>
<div class="topic" onclick="openTopic('stats')">Descriptive Stats</div>
<div class="topic" onclick="openTopic('prob')">Probability</div>
<div class="topic" onclick="openTopic('corr')">Correlation</div>
<div class="topic" onclick="openTopic('reg')">Regression</div>
</div>

<!-- MAIN -->
<div id="main">

<div id="topbar">
<h2 id="title">Welcome</h2>
<p id="subtitle">Structured learning + interactive lab</p>
</div>

<div id="content">

<div class="panel" id="theory"></div>
<div class="panel" id="lab"></div>

</div>

</div>

<script>

/* ================= STATE ================= */

let currentTopic = "intro";
let page = 1;

let dataset = [];
let chart = null;

/* ================= THEORY (3 PAGES EACH TOPIC) ================= */

const theory = {

intro:[
`<h2>Introduction (Page 1)</h2>
<p>Data Analytics is the process of analyzing raw data to extract meaningful insights.</p>
<p>It is used in business, healthcare, finance, AI systems.</p>`,

`<h2>Introduction (Page 2)</h2>
<p>Pipeline: Data → Cleaning → Analysis → Visualization → Decision</p>
<p>There are 4 types: Descriptive, Diagnostic, Predictive, Prescriptive.</p>`,

`<h2>Introduction (Page 3)</h2>
<p>Data analytics connects statistics, programming, and domain knowledge.</p>
<p>It helps convert raw data into actionable decisions.</p>`
],

types:[
`<h2>Types of Data (Page 1)</h2>
<p>Qualitative data: categories like gender, color.</p>
<p>Quantitative data: numerical values.</p>`,

`<h2>Types of Data (Page 2)</h2>
<p>Discrete data: countable values.</p>
<p>Continuous data: measurable values.</p>`,

`<h2>Types of Data (Page 3)</h2>
<p>Data types determine which analysis methods are valid.</p>
`
],

collection:[
`<h2>Data Collection (Page 1)</h2>
<p>Sources: APIs, sensors, surveys, scraping.</p>`,

`<h2>Data Collection (Page 2)</h2>
<p>Quality matters more than quantity.</p>`,

`<h2>Data Collection (Page 3)</h2>
<p>Bad data leads to wrong decisions.</p>`
],

cleaning:[
`<h2>Data Cleaning (Page 1)</h2>
<p>Remove missing values and duplicates.</p>`,

`<h2>Data Cleaning (Page 2)</h2>
<p>Normalize inconsistent formats.</p>`,

`<h2>Data Cleaning (Page 3)</h2>
<p>Cleaning is 70% of real data work.</p>`
],

stats:[
`<h2>Descriptive Stats (Page 1)</h2>
<p>Mean = average of values.</p>`,

`<h2>Descriptive Stats (Page 2)</h2>
<p>Variance measures spread of data.</p>`,

`<h2>Descriptive Stats (Page 3)</h2>
<p>Standard deviation = square root of variance.</p>`
],

prob:[
`<h2>Probability (Page 1)</h2>
<p>Measures uncertainty of events.</p>`,

`<h2>Probability (Page 2)</h2>
<p>Used in prediction models and AI.</p>`,

`<h2>Probability (Page 3)</h2>
<p>Law of large numbers explains stability of averages.</p>`
],

corr:[
`<h2>Correlation (Page 1)</h2>
<p>Measures relationship between variables.</p>`,

`<h2>Correlation (Page 2)</h2>
<p>Ranges from -1 to +1.</p>`,

`<h2>Correlation (Page 3)</h2>
<p>Correlation does NOT mean causation.</p>`
],

reg:[
`<h2>Regression (Page 1)</h2>
<p>Used to predict numerical values.</p>`,

`<h2>Regression (Page 2)</h2>
<p>Model: y = mx + c</p>`,

`<h2>Regression (Page 3)</h2>
<p>Used in forecasting and machine learning.</p>`
]

};

/* ================= NAVIGATION ================= */

function openTopic(t){

currentTopic = t;
page = 1;

document.querySelectorAll(".topic").forEach(x=>x.classList.remove("active"));
event.target.classList.add("active");

render();
}

/* ================= PAGE CONTROL ================= */

function nextPage(){
if(page < 3){
page++;
render();
}
}

function prevPage(){
if(page > 1){
page--;
render();
}
}

/* ================= RENDER ================= */

function render(){

document.getElementById("theory").innerHTML =
(theory[currentTopic] && theory[currentTopic][page-1]) || "<h2>Coming Soon</h2>";

document.getElementById("lab").innerHTML = `
<h3>Lab Controls</h3>

<button onclick="prevPage()">⬅ Prev</button>
<button onclick="nextPage()">Next ➡</button>

<hr>

<h4>Mini Simulation</h4>
<button onclick="runSim()">Run Simulation</button>

<canvas id="chart"></canvas>
`;
}

/* ================= SIMULATION ENGINE ================= */

function runSim(){

if(chart) chart.destroy();

let canvas = document.getElementById("chart");

let data = Array.from({length:20},()=>Math.random()*100);

chart = new Chart(canvas,{
type:"bar",
data:{
labels:data.map((_,i)=>i),
datasets:[{
label:"Dataset",
data:data,
backgroundColor:"#38bdf8"
}]
}
});

}

/* ================= INIT ================= */

render();

</script>

</body>
</html>
