<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced Data Analytics Lab</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
background:#0b1020;
color:white;
}

#sidebar{
width:280px;
background:#111827;
padding:10px;
overflow:auto;
}

.topic{
padding:10px;
margin:6px;
background:#1f2937;
cursor:pointer;
border-radius:6px;
}

.topic:hover{background:#374151;}
.topic.active{background:#38bdf8;color:black;}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#top{
padding:15px;
border-bottom:1px solid #1f2937;
}

#content{
flex:1;
display:flex;
gap:10px;
padding:10px;
}

.panel{
flex:1;
background:#111827;
padding:10px;
border-radius:10px;
overflow:auto;
}

canvas{
background:white;
border-radius:10px;
}

button{
padding:8px;
margin-top:10px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="sidebar">
<h3>📊 Data Science Lab</h3>

<div class="topic active" onclick="load('stats')">EDA Stats</div>
<div class="topic" onclick="load('prob')">Probability</div>
<div class="topic" onclick="load('corr')">Correlation</div>
<div class="topic" onclick="load('reg')">Regression</div>
</div>

<div id="main">

<div id="top">
<h2 id="title">Data Analytics Engine</h2>
<p id="desc">Select a module</p>
</div>

<div id="content">

<div class="panel">
<canvas id="chart"></canvas>
</div>

<div class="panel" id="info">
Analysis will appear here
</div>

</div>

</div>

<script>

let chart;
let dataSet=[];

/* ---------------- DATA ENGINE ---------------- */

function generateData(n){
dataSet=[];
for(let i=0;i<n;i++){
dataSet.push(Math.floor(Math.random()*100));
}
}

/* ---------------- MATH ENGINE ---------------- */

function mean(arr){
return arr.reduce((a,b)=>a+b)/arr.length;
}

function variance(arr){
let m=mean(arr);
return mean(arr.map(x=>(x-m)**2));
}

function std(arr){
return Math.sqrt(variance(arr));
}

/* ---------------- MAIN SYSTEM ---------------- */

function load(type){

document.querySelectorAll(".topic").forEach(t=>t.classList.remove("active"));
event.target.classList.add("active");

if(chart) chart.destroy();

let canvas=document.getElementById("chart");
let info=document.getElementById("info");

canvas.style.display="block";

/* ================= EDA ================= */
if(type==="stats"){

generateData(30);

chart=new Chart(canvas,{
type:"bar",
data:{
labels:dataSet.map((_,i)=>i),
datasets:[{
label:"Values",
data:dataSet,
backgroundColor:"#38bdf8"
}]
}
});

info.innerHTML=`
<h3>📊 EDA Statistics</h3>
<p>Mean: ${mean(dataSet).toFixed(2)}</p>
<p>Median: ${dataSet.sort((a,b)=>a-b)[Math.floor(dataSet.length/2)]}</p>
<p>Variance: ${variance(dataSet).toFixed(2)}</p>
<p>Std Dev: ${std(dataSet).toFixed(2)}</p>
`;
}

/* ================= PROBABILITY ================= */
if(type==="prob"){

let n=2000;
let heads=0;

for(let i=0;i<n;i++){
if(Math.random()>0.5) heads++;
}

chart=new Chart(canvas,{
type:"pie",
data:{
labels:["Heads","Tails"],
datasets:[{
data:[heads,n-heads],
backgroundColor:["#38bdf8","#f87171"]
}]
}
});

info.innerHTML=`
<h3>🎲 Probability Engine</h3>
<p>Trials: ${n}</p>
<p>Heads: ${heads}</p>
<p>Tails: ${n-heads}</p>
<p>Law of Large Numbers demonstration</p>
`;
}

/* ================= CORRELATION ================= */
if(type==="corr"){

let x=[], y=[], data=[];

for(let i=0;i<30;i++){
let xi=i;
let yi=2*i + (Math.random()*15);
x.push(xi);
y.push(yi);
data.push({x:xi,y:yi});
}

chart=new Chart(canvas,{
type:"scatter",
data:{
datasets:[{
label:"X vs Y",
data:data,
backgroundColor:"#38bdf8"
}]
}
});

info.innerHTML=`
<h3>📈 Correlation</h3>
<p>Relationship: Positive Linear Trend</p>
<p>Noise added to simulate real-world data</p>
`;
}

/* ================= REGRESSION ================= */
if(type==="reg"){

let x=[], y=[], line=[];

for(let i=0;i<30;i++){
x.push(i);
y.push(3*i + (Math.random()*10));
line.push(3*i);
}

chart=new Chart(canvas,{
type:"line",
data:{
labels:x,
datasets:[
{
label:"Data",
data:y,
borderColor:"#38bdf8",
fill:false
},
{
label:"Trend",
data:line,
borderColor:"#f87171",
fill:false
}
]
}
});

info.innerHTML=`
<h3>📉 Regression Engine</h3>
<p>Model: y = 3x + noise</p>
<p>Red line = ideal regression trend</p>
`;
}

}

</script>

</body>
</html>
